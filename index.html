<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CEO Marketing Copilot</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
        surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',700:'#1e293b',800:'#0f172a',900:'#020617' }
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
* { font-family: 'Inter', system-ui, sans-serif; }
body { overflow: hidden; }
.step-active { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); color: white; }
.card-glow { box-shadow: 0 0 30px rgba(99,102,241,0.08); }
.card-glow:hover { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.4s ease-out forwards; }
@keyframes spin { to{transform:rotate(360deg)} }
.spinner { animation: spin 1s linear infinite; }
.timeline-line { position:absolute; left:19px; top:0; bottom:0; width:2px; background:linear-gradient(to bottom,#4f46e5,#6366f1,#818cf8); }
.method-tag { font-size:10px; font-weight:700; letter-spacing:0.05em; padding:2px 8px; border-radius:6px; white-space:nowrap; }
.tag-spin-s { background:#3b82f620; color:#60a5fa; }
.tag-spin-p { background:#ef444420; color:#f87171; }
.tag-spin-i { background:#f59e0b20; color:#fbbf24; }
.tag-spin-n { background:#22c55e20; color:#4ade80; }
.tag-pain-surface { background:#a855f720; color:#c084fc; }
.tag-pain-impact { background:#ec489920; color:#f472b6; }
.tag-pain-personal { background:#f4364620; color:#fb7185; }
.tag-challenger { background:#06b6d420; color:#22d3ee; }
.copy-btn { opacity:0; transition:opacity 0.2s; }
.copy-wrap:hover .copy-btn { opacity:1; }
@media print {
  .no-print { display:none!important; }
  body { overflow:visible; background:white!important; color:black!important; }
  html.dark body { background:white!important; color:black!important; }
  * { color:black!important; background:transparent!important; box-shadow:none!important; border-color:#ddd!important; }
  main { margin:0!important; padding:20px!important; max-width:100%!important; overflow:visible!important; height:auto!important; }
  .method-tag { border:1px solid #999!important; }
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0f172a; }
::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#475569; }
</style>
</head>
<body class="bg-surface-900 text-gray-100 h-screen flex">

<!-- Sidebar -->
<aside id="sidebar" class="no-print w-64 bg-surface-800 border-r border-gray-700/50 flex flex-col shrink-0 h-screen">
  <div class="p-5 border-b border-gray-700/50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
        <i data-lucide="rocket" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="font-bold text-sm text-white">Marketing Copilot</h1>
        <p class="text-[10px] text-gray-400 tracking-wide uppercase">CEO Edition</p>
      </div>
    </div>
  </div>
  <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="nav-steps"></nav>
  <div class="p-3 border-t border-gray-700/50">
    <button onclick="openSettings()" class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm text-gray-400 hover:bg-gray-700/50 hover:text-white transition-all">
      <i data-lucide="settings" class="w-4 h-4"></i> API Settings
    </button>
    <button onclick="toggleTheme()" class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm text-gray-400 hover:bg-gray-700/50 hover:text-white transition-all mt-1">
      <i data-lucide="sun" class="w-4 h-4" id="theme-icon"></i> <span id="theme-label">Light Mode</span>
    </button>
  </div>
</aside>

<!-- Main -->
<main class="flex-1 overflow-y-auto h-screen">
  <div id="main-content" class="max-w-5xl mx-auto p-8"></div>
</main>

<!-- Settings Modal -->
<div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
  <div class="bg-surface-800 border border-gray-700/50 rounded-2xl shadow-2xl w-full max-w-md mx-4 fade-in">
    <div class="flex items-center justify-between p-5 border-b border-gray-700/50">
      <h2 class="font-semibold text-lg flex items-center gap-2"><i data-lucide="key" class="w-5 h-5 text-brand-400"></i> API Configuration</h2>
      <button onclick="closeSettings()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="p-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">AI Provider</label>
        <select id="ai-provider" class="w-full bg-surface-900 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
          <option value="gemini">Google Gemini (1.5 Flash)</option>
          <option value="anthropic">Anthropic Claude (3.5 Sonnet)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">API Key</label>
        <div class="relative">
          <input id="api-key" type="password" placeholder="Enter your API key..." class="w-full bg-surface-900 border border-gray-600 rounded-lg px-3 py-2.5 text-sm pr-10 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none"/>
          <button onclick="toggleKeyVisibility()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white"><i data-lucide="eye" class="w-4 h-4" id="eye-icon"></i></button>
        </div>
      </div>
      <div class="bg-brand-500/10 border border-brand-500/20 rounded-lg p-3">
        <p class="text-xs text-brand-300 leading-relaxed">Your API key is stored locally in your browser and never sent to any server other than your chosen AI provider.</p>
      </div>
      <button onclick="saveSettings()" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">Save Configuration</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'ceo_copilot_state';
const defaultState = {
  currentStep: 0,
  apiProvider: 'gemini',
  apiKey: '',
  business: { name:'', industry:'', audience:'', usps:'' },
  persona: null,
  pitch: null,
  plan: null,
  kpiChecks: {},
  // Sales & Training state
  salesTab: 'scripts',
  discoveryScript: null,
  followUpPack: null,
  multiChannel: null,
  combinedFlow: null,
  spinScript: null,
  challengerSegment: null,
  sandlerFunnel: null,
  methodGuide: null,
  trainingDrills: null,
  trainingChecks: {}
};
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? { ...defaultState, ...JSON.parse(s) } : { ...defaultState };
  } catch { return { ...defaultState }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ============================================================
// NAV
// ============================================================
const steps = [
  { icon:'briefcase', label:'Business Intake', id:'intake' },
  { icon:'user-circle', label:'Buyer Persona', id:'persona' },
  { icon:'megaphone', label:'Sales Pitch', id:'pitch' },
  { icon:'layout-grid', label:'Marketing Plan', id:'plan' },
  { icon:'bar-chart-3', label:'Execution & Track', id:'execute' },
  { icon:'phone-call', label:'Calls & Training', id:'sales' }
];

function renderNav() {
  const nav = document.getElementById('nav-steps');
  // Divider before sales section
  const marketingSteps = steps.slice(0,5);
  const salesSteps = steps.slice(5);

  let html = marketingSteps.map((s,i) => navBtn(s,i)).join('');
  html += `<div class="pt-2 mt-2 border-t border-gray-700/40"><p class="px-3 py-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Sales Enablement</p></div>`;
  html += salesSteps.map((s,i) => navBtn(s, i + 5)).join('');

  nav.innerHTML = html;
  lucide.createIcons();
}

function navBtn(s, i) {
  const done = i < state.currentStep && i < 5;
  const active = i === state.currentStep;
  // Sales step (5) accessible after persona + pitch exist
  const accessible = i <= state.currentStep || (i === 5 && state.persona && state.pitch);
  return `<button onclick="${accessible ? `goToStep(${i})` : ''}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all ${active ? 'step-active font-semibold shadow-lg shadow-brand-500/20' : done ? 'text-green-400 hover:bg-gray-700/50' : accessible ? 'text-gray-300 hover:bg-gray-700/50' : 'text-gray-600 cursor-not-allowed'}">
    <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 ${active ? 'bg-white/20' : done ? 'bg-green-500/20' : 'bg-gray-700/50'}">
      ${done ? '<i data-lucide="check" class="w-4 h-4"></i>' : `<i data-lucide="${s.icon}" class="w-4 h-4"></i>`}
    </div>
    <span>${s.label}</span>
  </button>`;
}

function goToStep(i) { state.currentStep = i; saveState(); render(); }

// ============================================================
// SETTINGS
// ============================================================
function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); document.getElementById('settings-modal').classList.add('flex'); document.getElementById('ai-provider').value = state.apiProvider; document.getElementById('api-key').value = state.apiKey; lucide.createIcons(); }
function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); document.getElementById('settings-modal').classList.remove('flex'); }
function saveSettings() { state.apiProvider = document.getElementById('ai-provider').value; state.apiKey = document.getElementById('api-key').value; saveState(); closeSettings(); showToast('Settings saved'); }
function toggleKeyVisibility() { const el = document.getElementById('api-key'); el.type = el.type === 'password' ? 'text' : 'password'; }

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  const dark = document.documentElement.classList.contains('dark');
  document.getElementById('theme-label').textContent = dark ? 'Light Mode' : 'Dark Mode';
  render();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, err=false) {
  const t = document.createElement('div');
  t.className = `fixed top-5 right-5 z-50 px-4 py-3 rounded-xl text-sm font-medium shadow-xl fade-in ${err ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ============================================================
// AI CALL
// ============================================================
async function callAI(systemPrompt, userPrompt) {
  if (!state.apiKey) { showToast('Please set your API key first', true); openSettings(); throw new Error('No API key'); }

  if (state.apiProvider === 'gemini') {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: userPrompt }] }],
        generationConfig: { temperature: 0.7, responseMimeType: 'application/json' }
      })
    });
    if (!res.ok) { const e = await res.text(); throw new Error(`Gemini error: ${e}`); }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    return parseJSON(text);
  } else {
    const proxy = 'https://corsproxy.io/?';
    const url = `${proxy}https://api.anthropic.com/v1/messages`;
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 2048,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    if (!res.ok) { const e = await res.text(); throw new Error(`Claude error: ${e}`); }
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return parseJSON(text);
  }
}

function parseJSON(raw) {
  let s = raw.trim();
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
  try { return JSON.parse(s); } catch {}
  const m = s.match(/\{[\s\S]*\}/);
  if (m) try { return JSON.parse(m[0]); } catch {}
  throw new Error('Could not parse AI response as JSON');
}

// ============================================================
// UTILITIES
// ============================================================
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function arrify(v) { return Array.isArray(v) ? v : (typeof v === 'string' ? v.split(/,\s*|;\s*|\n/).filter(Boolean) : [String(v||'')]); }

function sectionHeader(icon, title, subtitle) {
  return `<div class="mb-8 fade-in">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-10 rounded-xl bg-brand-500/20 flex items-center justify-center"><i data-lucide="${icon}" class="w-5 h-5 text-brand-400"></i></div>
      <div><h2 class="text-2xl font-bold text-white">${title}</h2><p class="text-sm text-gray-400">${subtitle}</p></div>
    </div>
  </div>`;
}

function inputField(id, label, placeholder, value, type='text', tag='input') {
  if (tag === 'textarea') return `<div><label class="block text-sm font-medium text-gray-300 mb-1.5">${label}</label><textarea id="${id}" placeholder="${placeholder}" rows="3" class="w-full bg-surface-900 border border-gray-600 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none resize-none">${value||''}</textarea></div>`;
  return `<div><label class="block text-sm font-medium text-gray-300 mb-1.5">${label}</label><input id="${id}" type="${type}" placeholder="${placeholder}" value="${escH(value||'')}" class="w-full bg-surface-900 border border-gray-600 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none"/></div>`;
}

function copyBlock(text, id) {
  return `<div class="copy-wrap relative">
    <button onclick="copyText('${id}')" class="copy-btn absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-2 py-1 rounded-lg flex items-center gap-1"><i data-lucide="copy" class="w-3 h-3"></i> Copy</button>
    <div id="${id}" class="bg-surface-900 rounded-xl p-4 border border-gray-700/30 text-sm text-gray-200 leading-relaxed whitespace-pre-wrap">${escH(text)}</div>
  </div>`;
}

function copyText(id) {
  const el = document.getElementById(id);
  if (el) { navigator.clipboard.writeText(el.textContent).then(() => showToast('Copied!')).catch(() => showToast('Copy failed', true)); }
}

function genBtn(id, label, onclick) {
  return `<button id="${id}" onclick="${onclick}" class="bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors text-sm inline-flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> ${label}</button>`;
}

function setLoading(id) {
  const btn = document.getElementById(id);
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full spinner"></div> Generating...'; }
}
function resetBtn(id, label) {
  const btn = document.getElementById(id);
  if (btn) { btn.disabled = false; btn.innerHTML = `<i data-lucide="sparkles" class="w-4 h-4"></i> ${label}`; lucide.createIcons(); }
}

function methodTag(label) {
  const map = {
    'SPIN_S': ['S - Situation', 'tag-spin-s'],
    'SPIN_P': ['P - Problem', 'tag-spin-p'],
    'SPIN_I': ['I - Implication', 'tag-spin-i'],
    'SPIN_N': ['N - Need-Payoff', 'tag-spin-n'],
    'PAIN_SURFACE': ['Pain: Surface', 'tag-pain-surface'],
    'PAIN_IMPACT': ['Pain: Impact', 'tag-pain-impact'],
    'PAIN_PERSONAL': ['Pain: Personal', 'tag-pain-personal'],
    'CHALLENGER': ['Challenger', 'tag-challenger'],
  };
  const [text, cls] = map[label] || [label, 'tag-spin-s'];
  return `<span class="method-tag ${cls}">${text}</span>`;
}

function getBD() { return `Business: ${state.business.name}. Industry: ${state.business.industry}. Target Audience: ${state.business.audience}. USPs: ${state.business.usps}.`; }

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ============================================================
// RENDER ROUTER
// ============================================================
function render() {
  renderNav();
  const c = document.getElementById('main-content');
  switch(state.currentStep) {
    case 0: renderIntake(c); break;
    case 1: renderPersona(c); break;
    case 2: renderPitch(c); break;
    case 3: renderPlan(c); break;
    case 4: renderExecute(c); break;
    case 5: renderSales(c); break;
  }
  lucide.createIcons();
}

// ============================================================
// STEP 0: INTAKE
// ============================================================
function renderIntake(c) {
  const b = state.business;
  c.innerHTML = `
    ${sectionHeader('briefcase','Business Intake','Tell us about your business so the AI can tailor your strategy.')}
    <div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow fade-in space-y-5">
      ${inputField('b-name','Business Name','e.g. Sunrise Bakery', b.name)}
      ${inputField('b-industry','Industry','e.g. Artisan Food & Beverage', b.industry)}
      ${inputField('b-audience','Target Audience','e.g. Health-conscious millennials in Austin, TX', b.audience)}
      ${inputField('b-usps','Core USPs (Unique Selling Points)','e.g. Organic ingredients, same-day delivery, family recipes since 1985', b.usps, 'text', 'textarea')}
      <button onclick="saveIntake()" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
        Continue <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>`;
}

function saveIntake() {
  const name = document.getElementById('b-name').value.trim();
  const industry = document.getElementById('b-industry').value.trim();
  const audience = document.getElementById('b-audience').value.trim();
  const usps = document.getElementById('b-usps').value.trim();
  if (!name || !industry || !audience || !usps) { showToast('Please fill all fields', true); return; }
  state.business = { name, industry, audience, usps };
  state.currentStep = 1;
  saveState(); render();
}

// ============================================================
// STEP 1: PERSONA
// ============================================================
function renderPersona(c) {
  if (state.persona) return renderPersonaResult(c);
  c.innerHTML = `
    ${sectionHeader('user-circle','Buyer Persona','Generate an AI-powered buyer persona for your ideal customer.')}
    <div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow fade-in text-center space-y-4">
      <div class="w-16 h-16 rounded-2xl bg-brand-500/20 flex items-center justify-center mx-auto"><i data-lucide="sparkles" class="w-8 h-8 text-brand-400"></i></div>
      <p class="text-gray-300">Click below to generate a detailed buyer persona based on your business information.</p>
      <div class="bg-surface-900 rounded-xl p-4 text-left text-sm text-gray-400 space-y-1">
        <p><strong class="text-gray-200">Business:</strong> ${escH(state.business.name)}</p>
        <p><strong class="text-gray-200">Industry:</strong> ${escH(state.business.industry)}</p>
        <p><strong class="text-gray-200">Audience:</strong> ${escH(state.business.audience)}</p>
      </div>
      ${genBtn('gen-persona-btn','Generate Persona','generatePersona()')}
    </div>`;
}

async function generatePersona() {
  setLoading('gen-persona-btn');
  try {
    const persona = await callAI('Act as an expert fractional CMO.',
      `Create a buyer persona for: ${getBD()}\nReturn ONLY valid JSON with keys: 'name', 'demographics', 'pain_points', 'buying_triggers', 'media_consumption'. Be extremely concise.`);
    state.persona = persona; saveState(); render();
  } catch(e) { showToast(e.message, true); resetBtn('gen-persona-btn','Generate Persona'); }
}

function renderPersonaResult(c) {
  const p = state.persona;
  c.innerHTML = `
    ${sectionHeader('user-circle','Buyer Persona','Your AI-generated ideal customer profile.')}
    <div class="grid md:grid-cols-2 gap-4 fade-in">
      <div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow md:col-span-2">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-2xl font-bold text-white">${(p.name||'?')[0]}</div>
          <div><h3 class="text-xl font-bold text-white">${escH(p.name||'Persona')}</h3><p class="text-sm text-gray-400">${escH(typeof p.demographics === 'string' ? p.demographics : JSON.stringify(p.demographics||''))}</p></div>
        </div>
      </div>
      ${personaCard('zap','Pain Points', arrify(p.pain_points), 'red')}
      ${personaCard('target','Buying Triggers', arrify(p.buying_triggers), 'amber')}
      <div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-5 card-glow md:col-span-2">
        <h4 class="font-semibold text-sm text-cyan-400 mb-3 flex items-center gap-2"><i data-lucide="tv" class="w-4 h-4"></i> Media Consumption</h4>
        <p class="text-sm text-gray-300 leading-relaxed">${escH(typeof p.media_consumption === 'string' ? p.media_consumption : (Array.isArray(p.media_consumption) ? p.media_consumption.join(', ') : JSON.stringify(p.media_consumption||'')))}</p>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button onclick="state.persona=null;saveState();render();" class="px-5 py-2.5 rounded-xl border border-gray-600 text-gray-300 hover:bg-gray-700/50 text-sm">Regenerate</button>

  const defaultChecks = ['Set up Google Analytics','Track QR code scans','Monitor social engagement weekly','Review podcast downloads monthly','Update Google Business Profile','Run monthly ROI analysis'];

              <h4 class="font-semibold text-sm text-white mt-1">${escH(t.label)}</h4>
              <p class="text-xs text-gray-400 mt-1">${escH(t.desc)}...</p>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="lg:col-span-2">
        <h3 class="font-semibold text-white mb-4 flex items-center gap-2"><i data-lucide="check-square" class="w-4 h-4 text-green-400"></i> KPI Checklist</h3>
        <div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-5 card-glow space-y-3">
          ${allChecks.map((m,i) => {
            const checked = state.kpiChecks[i]||false;
            return `<label class="flex items-start gap-3 cursor-pointer group"><input type="checkbox" ${checked?'checked':''} onchange="toggleKpi(${i})" class="mt-0.5 w-4 h-4 rounded border-gray-500 text-brand-500 focus:ring-brand-500 bg-surface-900"/><span class="text-sm ${checked?'text-gray-500 line-through':'text-gray-200'} group-hover:text-white transition-colors">${escH(m)}</span></label>`;

          ${kpis.how_to_gauge_success ? `<div class="pt-3 border-t border-gray-700/50 mt-3"><p class="text-xs text-gray-400"><strong class="text-gray-300">Success criteria:</strong> ${escH(kpis.how_to_gauge_success)}</p></div>` : ''}
        </div>
        <div class="mt-4 space-y-2">
          <button onclick="window.print()" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Print / Export Strategy</button>

        </div>
      </div>
    </div>`;
}

    txt += `--- DISCOVERY CALL ---\nPurpose: ${d.call_purpose||''}\n\nOpener:\n${d.opener||''}\n\nDiscovery Questions:\n${(d.discovery_questions||[]).map((q,i)=>`  ${i+1}. ${q}`).join('\n')}\n\nValue Statement:\n${d.value_statement||''}\n\nClose:\n${d.close_script||''}\n\nIf Busy:\n${d.fallback_if_busy||''}\n\n`;

    txt += `--- FOLLOW-UP ---\n${f.follow_up_script?.opener||''}\n\n--- OBJECTIONS ---\n`;

    }

    // One-Page Playbook
    if (t.one_page_playbook) {
      const pb = t.one_page_playbook;
      html += `<div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow">
        <div class="flex items-center gap-2 mb-4"><i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i><h3 class="font-semibold text-blue-300">One-Page Playbook</h3></div>
        <div class="grid md:grid-cols-3 gap-4">
          <div><h4 class="text-xs font-semibold text-blue-400 uppercase mb-2">Core Principles</h4>
            <div class="space-y-1">${arrify(pb.core_principles).map(p=>`<p class="text-sm text-gray-200 flex items-start gap-2"><span class="text-blue-400 mt-0.5">&#8226;</span>${escH(p)}</p>`).join('')}</div></div>
          <div><h4 class="text-xs font-semibold text-green-400 uppercase mb-2">Do's</h4>
            <div class="space-y-1">${arrify(pb.do_s||pb.dos||[]).map(d=>`<p class="text-sm text-gray-200 flex items-start gap-2"><i data-lucide="check" class="w-3 h-3 text-green-400 mt-1 shrink-0"></i>${escH(d)}</p>`).join('')}</div></div>
          <div><h4 class="text-xs font-semibold text-red-400 uppercase mb-2">Don'ts</h4>
            <div class="space-y-1">${arrify(pb.dont_s||pb.donts||[]).map(d=>`<p class="text-sm text-gray-200 flex items-start gap-2"><i data-lucide="x" class="w-3 h-3 text-red-400 mt-1 shrink-0"></i>${escH(d)}</p>`).join('')}</div></div>
        </div></div>`;
    }

    // Role-Play Scenarios
    if (t.role_play_scenarios?.length) {
      html += `<div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow">
        <div class="flex items-center gap-2 mb-4"><i data-lucide="theater" class="w-5 h-5 text-amber-400"></i><h3 class="font-semibold text-amber-300">Role-Play Scenarios</h3></div>
        <div class="grid md:grid-cols-2 gap-4">${t.role_play_scenarios.map((r,i) => `
          <div class="bg-surface-900 rounded-xl p-4 border border-gray-700/30">
            <h4 class="font-semibold text-sm text-white mb-2">${escH(r.title||`Scenario ${i+1}`)}</h4>
            <div class="space-y-1 text-sm">
              <p class="text-gray-400"><strong class="text-gray-300">Setup:</strong> ${escH(r.setup||'')}</p>
              <p class="text-gray-400"><strong class="text-gray-300">Rep Goal:</strong> ${escH(r.rep_goal||'')}</p>
              <p class="text-gray-400"><strong class="text-gray-300">Prospect:</strong> ${escH(r.prospect_profile||'')}</p>
              <p class="text-gray-400"><strong class="text-red-300">Twist:</strong> ${escH(r.twist_or_objection||'')}</p>
            </div>
          </div>`).join('')}</div></div>`;
    }

    // Microlearning Drills
    const allDrills = [...(t.microlearning_drills||[]), ...(t.spin_drills||[]), ...(t.challenger_drills||[]), ...(t.pain_funnel_drills||[])];
    if (allDrills.length) {
      html += `<div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow">
        <div class="flex items-center gap-2 mb-4"><i data-lucide="timer" class="w-5 h-5 text-green-400"></i><h3 class="font-semibold text-green-300">Microlearning Drills</h3></div>
        <div class="grid md:grid-cols-2 gap-4">${allDrills.map(d => `
          <div class="bg-surface-900 rounded-xl p-4 border border-gray-700/30">
            <div class="flex items-center justify-between mb-2"><h4 class="font-semibold text-sm text-white">${escH(d.name||'')}</h4>
              <span class="text-xs bg-green-500/20 text-green-300 px-2 py-0.5 rounded-full">${d.time_needed_minutes||5} min</span></div>
            <p class="text-sm text-gray-300 leading-relaxed">${escH(d.instructions||'')}</p>
          </div>`).join('')}</div></div>`;
    }

    // Self-Coaching Checklist
    if (t.self_coaching_checklist?.length) {
      html += `<div class="bg-surface-800 border border-gray-700/50 rounded-2xl p-6 card-glow">
        <div class="flex items-center gap-2 mb-4"><i data-lucide="clipboard-check" class="w-5 h-5 text-purple-400"></i><h3 class="font-semibold text-purple-300">Self-Coaching Checklist</h3></div>
        <div class="space-y-2">${t.self_coaching_checklist.map((item,i) => {
          const checked = state.trainingChecks[i]||false;
          return `<label class="flex items-start gap-3 cursor-pointer group"><input type="checkbox" ${checked?'checked':''} onchange="toggleTrainingCheck(${i})" class="mt-0.5 w-4 h-4 rounded border-gray-500 text-brand-500 focus:ring-brand-500 bg-surface-900"/><span class="text-sm ${checked?'text-gray-500 line-through':'text-gray-200'} group-hover:text-white transition-colors">${escH(item)}</span></label>`;
        }).join('')}</div></div>`;
    }
  }

  html += `<div class="flex gap-3 no-print">
    <button onclick="window.print()" class="bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 px-6 rounded-xl text-sm flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Export Training Pack</button>
    <button onclick="downloadTrainingPack()" class="border border-gray-600 text-gray-300 hover:bg-gray-700/50 py-2.5 px-6 rounded-xl text-sm flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> Download .txt</button>
  </div>`;

  html += '</div>';
  c.innerHTML = html;
}

function toggleTrainingCheck(i) { state.trainingChecks[i] = !state.trainingChecks[i]; saveState(); }

async function generateTraining() {
  setLoading('gen-training-btn');
  try {
    state.trainingDrills = await callAI('Act as a sales enablement leader.',
      `Design training collateral for a small sales team selling:\n${getBD()}\nPersona: ${JSON.stringify(state.persona)}\nBlend SPIN questioning, Challenger insight/teaching, and role-play/microlearning best practices.\nReturn ONLY valid JSON:\n{"methodology_summary":"","one_page_playbook":{"core_principles":[],"do_s":[],"dont_s":[]},"role_play_scenarios":[{"title":"","setup":"","rep_goal":"","prospect_profile":"","twist_or_objection":""}],"microlearning_drills":[{"name":"","instructions":"","time_needed_minutes":0}],"self_coaching_checklist":[]}\nKeep practical and short.`);
    saveState(); render();
  } catch(e) { showToast(e.message, true); resetBtn('gen-training-btn','Generate Training Pack'); }
}

function downloadTrainingPack() {
  if (!state.trainingDrills) { showToast('Generate training first', true); return; }
  const t = state.trainingDrills;
  let txt = `=== SALES TRAINING PACK ===\n${state.business.name}\n\n`;
  txt += `METHODOLOGY: ${t.methodology_summary||''}\n\n`;
  if (t.one_page_playbook) {
    txt += `--- PLAYBOOK ---\nPrinciples:\n${arrify(t.one_page_playbook.core_principles).map(p=>`  - ${p}`).join('\n')}\n\nDo's:\n${arrify(t.one_page_playbook.do_s||t.one_page_playbook.dos||[]).map(d=>`  + ${d}`).join('\n')}\n\nDon'ts:\n${arrify(t.one_page_playbook.dont_s||t.one_page_playbook.donts||[]).map(d=>`  - ${d}`).join('\n')}\n\n`;
  }
  if (t.role_play_scenarios?.length) {
    txt += `--- ROLE-PLAYS ---\n`;
    t.role_play_scenarios.forEach((r,i) => { txt += `\n${i+1}. ${r.title}\n   Setup: ${r.setup}\n   Goal: ${r.rep_goal}\n   Prospect: ${r.prospect_profile}\n   Twist: ${r.twist_or_objection}\n`; });
    txt += '\n';
  }
  const allDrills = [...(t.microlearning_drills||[]), ...(t.spin_drills||[]), ...(t.challenger_drills||[]), ...(t.pain_funnel_drills||[])];
  if (allDrills.length) {
    txt += `--- DRILLS ---\n`;
    allDrills.forEach(d => { txt += `\n${d.name} (${d.time_needed_minutes} min)\n${d.instructions}\n`; });
    txt += '\n';
  }
  if (t.self_coaching_checklist?.length) {
    txt += `--- SELF-COACHING ---\n${t.self_coaching_checklist.map(c=>`  [ ] ${c}`).join('\n')}\n`;
  }
  downloadText('training-pack.txt', txt);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
